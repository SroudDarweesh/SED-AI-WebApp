apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: sed-ai-agent
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 20
      timeoutSeconds: 60
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/REPOSITORY/IMAGE:TAG
          resources:
            limits:
              cpu: "1"
              memory: "512Mi"
          env:
            - name: GOOGLE_GENAI_USE_VERTEXAI
              value: "true"
            - name: GOOGLE_CLOUD_PROJECT
              value: PROJECT_ID
            - name: GOOGLE_CLOUD_LOCATION
              value: us-central1
            - name: ADK_MODEL
              value: gemini-2.5-flash
            - name: ADK_MOCK_MODE
              value: "false"
            - name: CORS_ALLOW_ORIGINS
              value: https://WEB_SERVICE_URL,http://localhost:4173
            - name: REQUIRE_FIREBASE_AUTH
              value: "true"
            - name: FIREBASE_PROJECT_ID
              value: PROJECT_ID
            - name: ALLOW_DEV_AUTH_BYPASS
              value: "false"
            - name: DEV_AUTH_BYPASS_TOKEN
              value: ""
          ports:
            - containerPort: 8080
